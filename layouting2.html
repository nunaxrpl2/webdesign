<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layouting 2</title>
    <style>
        .header{
            width: 900%;
            height: 250px;
            background-color: yellow;
            color: #000;
            padding-left: 30px;
        }
        .menu{
            width: 900%;
            height: 70px;
            background-color: red;
            color: #fff;
            padding-left: 30px;
        }
        .konten{
            display: flex;
            width: 100%;
            height: auto;
        }
        .sidebar{
            width: 30%;
            height: 600px;
            background-color: pink;
            color: #000;
        }
        .main{
            width: 70%;
            height: 600px;
            background-color: darkblue;
            color: #fff;
        }
        .footer{
            width: 900%;
            height: 100px;
            background-color: darkgreen;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">HEADER</div>
    <div class="menu">MENU</div>
    <div class="konten">
        <div class="sidebar">SIDEBAR</div>
        <div class="main">MAIN</div>
    </div>
<div class="footer">FOOTER</div>
</body>
</html>
